# fly.toml app configuration file generated for planningpokeronline on 2026-03-06T18:34:08+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'planningpokeronline'
primary_region = 'sin'

[build]

# Use services instead of http_service for WebSocket support
[[services]]
  internal_port = 3000
  protocol = "tcp"
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
