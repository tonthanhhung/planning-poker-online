# Deploy to Fly.io only on version tags (e.g., v1.0.0)
# Manual releases prevent broken deployments from every commit

name: Fly Deploy
on:
  push:
    tags:
      - 'v*'  # Only deploy on version tags like v1.0.0, v2.1.0
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --build-arg NEXT_PUBLIC_GIT_COMMIT=${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
